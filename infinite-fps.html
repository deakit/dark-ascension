<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITE FPS — бесконечная арена</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
  canvas { display:block; }
  #ui {
    position:fixed; top:0; left:0; right:0; bottom:0;
    pointer-events:none;
    color:#fff;
    text-shadow: 0 0 10px rgba(0,0,0,0.9);
  }
  #hud {
    position:absolute; bottom:30px; left:50%; transform:translateX(-50%);
    display:flex; gap:40px; font-size:18px; font-weight:700;
    background:rgba(0,0,0,0.5); padding:12px 32px; border-radius:12px;
    backdrop-filter:blur(4px);
    border:1px solid rgba(255,255,255,0.08);
  }
  #hud div { display:flex; align-items:center; gap:8px; }
  #hud .hp { color:#ff4757; }
  #hud .score { color:#ffd700; }
  #hud .wave { color:#70a1ff; }
  #hud .kills { color:#2ed573; }
  #crosshair {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:20px; height:20px;
  }
  #crosshair::before, #crosshair::after {
    content:''; position:absolute;
    background:#fff; opacity:0.5;
  }
  #crosshair::before { width:2px; height:100%; left:50%; transform:translateX(-50%); }
  #crosshair::after { height:2px; width:100%; top:50%; transform:translateY(-50%); }
  #crosshair .dot {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:4px; height:4px; border-radius:50%; background:#ff4757;
  }
  #msg {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-size:28px; font-weight:700; text-align:center; color:#fff;
    opacity:0; transition:opacity 0.5s;
    text-shadow:0 0 30px rgba(0,0,0,0.9);
    pointer-events:none;
    line-height:1.4;
  }
  #msg.show { opacity:1; }
  #wave-announce {
    position:absolute; top:35%; left:50%; transform:translate(-50%,-50%);
    font-size:48px; font-weight:800; color:#70a1ff;
    opacity:0; transition:opacity 0.3s;
    pointer-events:none;
    text-shadow:0 0 40px rgba(112,161,255,0.5);
  }
  #wave-announce.show { opacity:1; }
  #reload {
    position:absolute; bottom:100px; left:50%; transform:translateX(-50%);
    color:#ffd700; font-size:14px; opacity:0;
    transition:opacity 0.2s;
    pointer-events:none;
  }
  #reload.show { opacity:1; }
  #death-counter {
    position:absolute; top:20px; right:20px;
    color:#555; font-size:13px;
  }
  #weapon {
    position:absolute; bottom:110px; left:50%; transform:translateX(-50%);
    color:#888; font-size:12px;
  }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<div id="ui">
  <div id="msg">🌆 INFINITE FPS<br><span style="font-size:18px;opacity:0.7">Волны врагов на бесконечной арене<br>Мышь — прицел · ЛКМ — стрелять · R — перезарядка</span></div>
  <div id="wave-announce"></div>
  <div id="crosshair"><div class="dot"></div></div>
  <div id="reload">🔃 Перезарядка...</div>
  <div id="hud">
    <div class="hp">❤️ <span id="hpDisplay">5</span></div>
    <div class="kills">☠️ <span id="killDisplay">0</span></div>
    <div class="wave">🌊 <span id="waveDisplay">0</span></div>
    <div class="score">🏆 <span id="scoreDisplay">0</span></div>
  </div>
  <div id="weapon">🔫 ПИСТОЛЕТ</div>
  <div id="death-counter">Смертей: <span id="deathDisplay">0</span></div>
</div>

<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');

let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// DOM refs
const hpSpan = document.getElementById('hpDisplay');
const killSpan = document.getElementById('killDisplay');
const waveSpan = document.getElementById('waveDisplay');
const scoreSpan = document.getElementById('scoreDisplay');
const deathSpan = document.getElementById('deathDisplay');
const msgEl = document.getElementById('msg');
const waveAnn = document.getElementById('wave-announce');
const reloadEl = document.getElementById('reload');

// --- INPUT ---
let mouseX = W/2, mouseY = H/2;
let mouseDown = false;
const keys = {};

canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
canvas.addEventListener('mousedown', e => { if (e.button === 0) mouseDown = true; });
canvas.addEventListener('mouseup', e => { if (e.button === 0) mouseDown = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if (e.key === 'r' || e.key === 'R') tryReload(); });
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// Pointer lock
canvas.addEventListener('click', () => { if (!document.pointerLockElement) canvas.requestPointerLock(); });
document.addEventListener('pointerlockchange', () => {
  if (document.pointerLockElement) {
    document.addEventListener('mousemove', trackMouse);
  } else {
    document.removeEventListener('mousemove', trackMouse);
  }
});
let dx = 0, dy = 0;
function trackMouse(e) {
  dx += e.movementX;
  dy += e.movementY;
}

// --- GAME STATE ---
const G = {
  hp: 5, maxHp: 5,
  score: 0,
  kills: 0,
  wave: 0,
  deaths: 0,
  running: true,
  started: false,
  gameOver: false,
  invincible: 0,
  particles: [],
  enemies: [],
  bullets: [],
  walls: [],
  spawnTimer: 0,
  waveDelay: 0,
  recoil: 0,
};

// --- WEAPON ---
const WEAPON = {
  magSize: 12,
  ammo: 12,
  total: 48,
  fireRate: 8,
  reloadTime: 40,
  reloading: false,
  reloadTimer: 0,
  cooldown: 0,
  damage: 1,
  spread: 0.03,
};

function tryReload() {
  if (WEAPON.reloading) return;
  if (WEAPON.ammo >= WEAPON.magSize) return;
  if (WEAPON.total <= 0) return;
  WEAPON.reloading = true;
  WEAPON.reloadTimer = WEAPON.reloadTime;
  reloadEl.classList.add('show');
}

// --- PLAYER (3D-like) ---
const player = {
  x: 0, y: 0,
  angle: 0,
  height: 0.5,
};

// --- ENEMY CLASS ---
const ENEMY_TYPES = [
  { name: 'Scout', hp:1, speed:1.8, size:0.3, color:'#ff6b6b', score:10 },
  { name: 'Soldier', hp:2, speed:1.2, size:0.35, color:'#ff4757', score:20 },
  { name: 'Heavy', hp:5, speed:0.7, size:0.45, color:'#c0392b', score:50 },
  { name: 'Runner', hp:1, speed:2.5, size:0.25, color:'#ffa502', score:15 },
];

function spawnEnemy(type) {
  const angle = Math.random() * Math.PI * 2;
  const dist = 6 + Math.random() * 4;
  const t = ENEMY_TYPES[type];
  G.enemies.push({
    x: player.x + Math.cos(angle) * dist,
    y: player.y + Math.sin(angle) * dist,
    hp: t.hp, maxHp: t.hp,
    speed: t.speed,
    size: t.size,
    color: t.color,
    score: t.score,
    type: type,
    hitFlash: 0,
    wobble: Math.random() * Math.PI * 2,
  });
}

function spawnWave() {
  G.wave++;
  G.waveDelay = 60;
  waveAnn.textContent = 'ВОЛНА ' + G.wave;
  waveAnn.classList.add('show');
  setTimeout(() => waveAnn.classList.remove('show'), 1200);

  const count = 3 + G.wave * 2 + Math.floor(G.wave / 3) * 3;
  const maxType = Math.min(Math.floor(G.wave / 2) + 1, ENEMY_TYPES.length - 1);

  for (let i = 0; i < count; i++) {
    const type = Math.min(Math.floor(Math.random() * (maxType + 1)), maxType);
    setTimeout(() => spawnEnemy(type), i * 200 + Math.random() * 500);
  }
}

// --- BULLETS ---
function fireBullet() {
  if (WEAPON.reloading) return;
  if (WEAPON.cooldown > 0) return;
  if (WEAPON.ammo <= 0) { tryReload(); return; }

  WEAPON.ammo--;
  WEAPON.cooldown = WEAPON.fireRate;
  G.recoil = 6;

  const spread = (Math.random() - 0.5) * WEAPON.spread;
  const angle = player.angle + spread;

  G.bullets.push({
    x: player.x + Math.cos(player.angle) * 0.5,
    y: player.y + Math.sin(player.angle) * 0.5,
    vx: Math.cos(angle) * 12,
    vy: Math.sin(angle) * 12,
    life: 30,
  });

  // Muzzle flash
  spawnParticles(
    player.x + Math.cos(player.angle) * 0.5,
    player.y + Math.sin(player.angle) * 0.5,
    '#ffd700', 3, 0.5, 5
  );
}

// --- PARTICLES ---
function spawnParticles(x, y, color, count, speed, life) {
  life = life || 20;
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * speed + 0.5;
    G.particles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      life: life + Math.random() * life,
      maxLife: life * 2,
      color,
      size: 1 + Math.random() * 3,
    });
  }
}

// --- UPDATE ---
function update() {
  if (!G.running) return;

  // Wave timer
  if (G.waveDelay > 0) { G.waveDelay--; }
  if (G.enemies.length === 0 && G.waveDelay <= 0 && G.running) {
    spawnWave();
  }

  // Mouse look (pointer lock)
  if (document.pointerLockElement) {
    player.angle += dx * 0.003;
    dx = 0;
    dy = 0;
  } else {
    // Fallback: aim at mouse
    const cx = W/2, cy = H/2;
    player.angle = Math.atan2(mouseY - cy, mouseX - cx);
  }

  // Movement (WASD relative to camera)
  if (G.running) {
    let mx = 0, my = 0;
    if (keys['w'] || keys['arrowup']) { mx += Math.cos(player.angle); my += Math.sin(player.angle); }
    if (keys['s'] || keys['arrowdown']) { mx -= Math.cos(player.angle); my -= Math.sin(player.angle); }
    if (keys['a'] || keys['arrowleft']) { mx += Math.cos(player.angle - Math.PI/2); my += Math.sin(player.angle - Math.PI/2); }
    if (keys['d'] || keys['arrowright']) { mx -= Math.cos(player.angle - Math.PI/2); my -= Math.sin(player.angle - Math.PI/2); }
    const len = Math.sqrt(mx*mx + my*my);
    if (len > 0) { mx /= len; my /= len; }
    const speed = 0.06;
    player.x += mx * speed;
    player.y += my * speed;
  }

  // Shooting
  if (WEAPON.cooldown > 0) WEAPON.cooldown--;
  if (mouseDown && G.running && WEAPON.cooldown <= 0) fireBullet();

  // Reload
  if (WEAPON.reloading) {
    WEAPON.reloadTimer--;
    if (WEAPON.reloadTimer <= 0) {
      const need = WEAPON.magSize - WEAPON.ammo;
      const give = Math.min(need, WEAPON.total);
      WEAPON.ammo += give;
      WEAPON.total -= give;
      WEAPON.reloading = false;
      reloadEl.classList.remove('show');
    }
  }

  // Invincibility
  if (G.invincible > 0) G.invincible--;

  // Update bullets
  for (let i = G.bullets.length-1; i >= 0; i--) {
    const b = G.bullets[i];
    b.x += b.vx * 0.02;
    b.y += b.vy * 0.02;
    b.life--;
    if (b.life <= 0) { G.bullets.splice(i,1); continue; }

    // Hit enemies
    for (let j = G.enemies.length-1; j >= 0; j--) {
      const e = G.enemies[j];
      const dx = b.x - e.x, dy = b.y - e.y;
      if (dx*dx + dy*dy < e.size * e.size) {
        e.hp -= WEAPON.damage;
        e.hitFlash = 4;
        G.bullets.splice(i,1);
        spawnParticles(b.x, b.y, '#ff4757', 5, 1, 10);
        if (e.hp <= 0) {
          G.score += e.score;
          G.kills++;
          G.enemies.splice(j,1);
          spawnParticles(e.x, e.y, e.color, 12, 2, 15);
        }
        break;
      }
    }
  }

  // Update enemies
  for (let i = G.enemies.length-1; i >= 0; i--) {
    const e = G.enemies[i];
    const dx = player.x - e.x;
    const dy = player.y - e.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 0) {
      e.x += (dx/dist) * e.speed * 0.03;
      e.y += (dy/dist) * e.speed * 0.03;
    }
    e.wobble += 0.05;
    if (e.hitFlash > 0) e.hitFlash--;

    // Damage player
    if (dist < e.size + 0.3 && G.invincible <= 0) {
      G.hp--;
      G.invincible = 60;
      spawnParticles(player.x, player.y, '#ff4757', 10, 1.5, 12);
      if (G.hp <= 0) {
        G.hp = 0;
        G.running = false;
        G.gameOver = true;
        G.deaths++;
        msgEl.textContent = '💀 ТЫ ПОГИБ\nВолна ' + G.wave + ' · Очков: ' + G.score + '\nНажми ENTER чтобы начать заново';
        msgEl.classList.add('show');
        waveAnn.classList.remove('show');
      }
      break;
    }
  }

  // Update particles
  for (let i = G.particles.length-1; i >= 0; i--) {
    const p = G.particles[i];
    p.x += p.vx * 0.03;
    p.y += p.vy * 0.03;
    p.life--;
    if (p.life <= 0) G.particles.splice(i,1);
  }

  // Recoil decay
  if (G.recoil > 0) G.recoil *= 0.85;

  // UI update
  hpSpan.textContent = G.hp;
  killSpan.textContent = G.kills;
  waveSpan.textContent = G.wave;
  scoreSpan.textContent = G.score;
  deathSpan.textContent = G.deaths;
  document.getElementById('weapon').textContent = (WEAPON.reloading ? '🔄 ПЕРЕЗАРЯДКА' : '🔫 ПИСТОЛЕТ ' + WEAPON.ammo + '/' + WEAPON.total);
}

// --- RENDER (3D-style raycasting arena) ---
function render() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  const fov = Math.PI / 2.5;
  const halfFov = fov / 2;
  const numRays = W;
  const step = fov / numRays;
  const startAngle = player.angle - halfFov;

  // Floor & ceiling
  const ceilGrad = ctx.createLinearGradient(0, 0, 0, H/2);
  ceilGrad.addColorStop(0, '#050510');
  ceilGrad.addColorStop(1, '#0a0a2a');
  ctx.fillStyle = ceilGrad;
  ctx.fillRect(0, 0, W, H/2);

  const floorGrad = ctx.createLinearGradient(0, H/2, 0, H);
  floorGrad.addColorStop(0, '#0a0a1a');
  floorGrad.addColorStop(1, '#1a0a0a');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, H/2, W, H/2);

  // Grid floor lines for depth
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 6; i++) {
    const y = H/2 + i * (H/12);
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }

  // Render enemies as 3D billboards
  // Sort by distance (far first for proper overlay)
  const sortedEnemies = [...G.enemies].sort((a,b) => {
    const da = (a.x-player.x)**2 + (a.y-player.y)**2;
    const db = (b.x-player.x)**2 + (b.y-player.y)**2;
    return db - da;
  });

  for (let e of sortedEnemies) {
    const dx = e.x - player.x;
    const dy = e.y - player.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    // Angle relative to player
    const angle = Math.atan2(dy, dx) - player.angle;
    let relAngle = angle;
    while (relAngle > Math.PI) relAngle -= Math.PI*2;
    while (relAngle < -Math.PI) relAngle += Math.PI*2;

    if (Math.abs(relAngle) > halfFov) continue;
    if (dist < 0.3) continue;

    // Screen position
    const screenX = (relAngle / halfFov) * (W/2) + W/2;
    const scale = 1 / (dist * 1.5);
    const h = H * scale * 1.2;
    const w = h * 0.6;

    // Bob
    const bob = Math.sin(e.wobble) * 2;

    // Wrap around
    if (screenX + w < -100 || screenX - w > W + 100) continue;

    // Color with hit flash
    let color = e.color;
    if (e.hitFlash > 0) color = '#fff';

    // Shadow / glow
    ctx.shadowColor = e.color;
    ctx.shadowBlur = 15;

    // HP bar
    const barW = w * 0.8;
    const barH = 4;
    const barY = H/2 - h/2 + bob - 10;

    // Body
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(screenX - w/2, H/2 - h/2 + bob, w, h, 4);
    ctx.fill();

    // Detail: eyes
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ff0000';
    const eyeSize = w * 0.12;
    ctx.beginPath();
    ctx.arc(screenX - w*0.2, H/2 - h*0.15 + bob, eyeSize, 0, Math.PI*2);
    ctx.arc(screenX + w*0.2, H/2 - h*0.15 + bob, eyeSize, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(screenX - w*0.2, H/2 - h*0.15 + bob, eyeSize*0.3, 0, Math.PI*2);
    ctx.arc(screenX + w*0.2, H/2 - h*0.15 + bob, eyeSize*0.3, 0, Math.PI*2);
    ctx.fill();

    // HP bar
    if (e.hp < e.maxHp) {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(screenX - barW/2, barY, barW, barH);
      ctx.fillStyle = '#2ed573';
      ctx.fillRect(screenX - barW/2, barY, barW * (e.hp/e.maxHp), barH);
    }

    ctx.shadowBlur = 0;
  }

  // Render particles (3D projected)
  for (let p of G.particles) {
    const dx = p.x - player.x;
    const dy = p.y - player.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const angle = Math.atan2(dy, dx) - player.angle;
    let relAngle = angle;
    while (relAngle > Math.PI) relAngle -= Math.PI*2;
    while (relAngle < -Math.PI) relAngle += Math.PI*2;
    if (Math.abs(relAngle) > halfFov || dist < 0.3) continue;

    const screenX = (relAngle / halfFov) * (W/2) + W/2;
    const scale = 1 / (dist * 1.5);
    const size = p.size * scale * 30;

    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(screenX, H/2 + (player.height - 0.5) * H * scale, Math.max(size, 1), 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  // Bullets as bright streaks
  for (let b of G.bullets) {
    const dx = b.x - player.x;
    const dy = b.y - player.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const angle = Math.atan2(dy, dx) - player.angle;
    let relAngle = angle;
    while (relAngle > Math.PI) relAngle -= Math.PI*2;
    while (relAngle < -Math.PI) relAngle += Math.PI*2;
    if (Math.abs(relAngle) > halfFov || dist < 0.3) continue;

    const screenX = (relAngle / halfFov) * (W/2) + W/2;
    const scale = 1 / (dist * 1.5);

    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.arc(screenX, H/2, Math.max(3 * scale * 30, 2), 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Recoil / weapon bob
  const recoilOff = G.recoil * 5;
  const bobX = Math.sin(Date.now()/200) * 2;
  const bobY = Math.sin(Date.now()/150) * 1;

  // Gun model (simple)
  const gunX = W/2 + 80 + bobX;
  const gunY = H - 60 + bobY + recoilOff;

  ctx.shadowColor = '#666';
  ctx.shadowBlur = 5;

  // Barrel
  ctx.fillStyle = '#333';
  ctx.fillRect(gunX - 6, gunY - 30, 12, 35);
  ctx.fillStyle = '#555';
  ctx.fillRect(gunX - 4, gunY - 35, 8, 10);

  // Handle
  ctx.fillStyle = '#4a3520';
  ctx.fillRect(gunX - 5, gunY + 5, 10, 20);

  // Slide
  ctx.fillStyle = '#444';
  ctx.fillRect(gunX - 7, gunY - 28, 14, 20);

  // Muzzle flash
  if (WEAPON.cooldown > WEAPON.fireRate - 3) {
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 30;
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.arc(gunX, gunY - 32, 8 + Math.random() * 5, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(gunX, gunY - 32, 3 + Math.random() * 3, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.shadowBlur = 0;
}

// Polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (r > w/2) r = w/2;
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
    return this;
  };
}

// --- RESET / START ---
function startGame() {
  G.hp = G.maxHp;
  G.score = 0;
  G.kills = 0;
  G.wave = 0;
  G.invincible = 0;
  G.enemies = [];
  G.bullets = [];
  G.particles = [];
  G.running = true;
  G.gameOver = false;
  G.spawnTimer = 0;
  G.waveDelay = 0;
  G.recoil = 0;
  player.x = 0;
  player.y = 0;
  WEAPON.ammo = WEAPON.magSize;
  WEAPON.total = 48;
  WEAPON.reloading = false;
  WEAPON.reloadTimer = 0;
  WEAPON.cooldown = 0;
  msgEl.classList.remove('show');
  waveAnn.classList.remove('show');
  reloadEl.classList.remove('show');
  G.started = true;
}

// Start on load
startGame();
msgEl.textContent = '🌆 INFINITE FPS\nВолны врагов на бесконечной арене\nКликни · Мышь — прицел · WASD — движение\nЛКМ — стрелять · R — перезарядка';
msgEl.classList.add('show');

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && G.gameOver) {
    startGame();
  }
  // M for mouse toggle
  if (e.key === 'm' || e.key === 'M') {
    if (document.pointerLockElement) document.exitPointerLock();
    else canvas.requestPointerLock();
  }
});

// Score popup
function showScore(x, y, text) {
  // handled by HUD
}

// --- GAME LOOP ---
function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
