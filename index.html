<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Ascension — платформер</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
  body { background: #0a0a12; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:system-ui,sans-serif; }
  .game-wrapper { position:relative; }
  canvas { border:2px solid #333; border-radius:8px; display:block; background:#1a1a2e; cursor:pointer; }
  #ui {
    position:absolute; top:0; left:0; right:0;
    padding:10px 16px;
    display:flex; justify-content:space-between;
    color:#fff; font-size:14px; font-weight:600;
    pointer-events:none;
    text-shadow:0 0 8px rgba(0,0,0,0.8);
  }
  #ui .hp { color:#ff4757; }
  #ui .gems { color:#ffd700; }
  #ui .level { color:#70a1ff; }
  #msg {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    color:#fff; font-size:24px; font-weight:700;
    text-align:center; pointer-events:none;
    text-shadow:0 0 20px rgba(0,0,0,0.9);
    opacity:0; transition:opacity 0.5s;
  }
  #msg.show { opacity:1; }
  #controls-hint {
    position:absolute; bottom:-36px; left:50%; transform:translateX(-50%);
    color:#555; font-size:12px; white-space:nowrap;
  }
</style>
</head>
<body>
<div class="game-wrapper">
  <canvas id="gc" width="960" height="540"></canvas>
  <div id="ui">
    <span class="hp">❤️ <span id="hpDisplay">5</span></span>
    <span class="level">🗡️ <span id="levelDisplay">Уровень 1</span></span>
    <span class="gems">💎 <span id="gemDisplay">0</span></span>
  </div>
  <div id="msg"></div>
  <div id="controls-hint">← → двигаться · Пробел прыжок · E атака · R перезапуск</div>
</div>

<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const W = 960, H = 540;

// UI elements
const hpSpan = document.getElementById('hpDisplay');
const levelSpan = document.getElementById('levelDisplay');
const gemSpan = document.getElementById('gemDisplay');
const msgEl = document.getElementById('msg');

// --- LORE / STORY ---
const STORY = [
  { text: 'Ты — последний страж света.\nТьма поглощает мир.', shown: false },
  { text: 'Собери 5 кристаллов света,\nчтобы открыть врата.', shown: false },
  { text: 'Берегись порождений тьмы.\nОни не дадут тебе пройти.', shown: false },
];
const WIN_TEXT = 'Свет возвращён! Ты спас мир. 🌟';
const DEATH_TEXT = 'Тьма поглотила тебя...\nНажми R, чтобы воскреснуть';

// --- GAME STATE ---
const G = {
  level: 1, maxLevel: 3,
  hp: 5, maxHp: 5,
  gems: 0, gemsToWin: 5,
  deathCount: 0,
  invincible: 0,
  running: true,
  won: false,
  showStory: 0,
  particles: [],
  screenshake: 0,
};

// --- PLAYER ---
const player = {
  x: 80, y: 300, w: 28, h: 36,
  vx: 0, vy: 0,
  onGround: false,
  facing: 1,
  attacking: 0,
  attackTimer: 0,
  animFrame: 0,
  animTimer: 0,
};

// --- INPUT ---
const keys = {};
let attackKey = false;

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'e' || e.key === 'E') attackKey = true;
  if (e.key === 'r' || e.key === 'R') resetGame();
  if (e.key === ' ') e.preventDefault();
});
document.addEventListener('keyup', e => {
  keys[e.key] = false;
});

// --- LEVEL DATA ---
const TILE = 32;
const COLS = Math.ceil(W/TILE) + 2;
const ROWS = Math.ceil(H/TILE) + 2;

let platforms = [];
let enemies = [];
let gems = [];
let spikes = [];
let door = null;
let camera = { x: 0, y: 0 };

// Tile types
const T = { AIR:0, WALL:1, SPIKE:2, GEM:3 };

function buildLevel(lvl) {
  platforms = [];
  enemies = [];
  gems = [];
  spikes = [];
  door = null;
  G.gems = 0;
  G.hp = G.maxHp;
  G.invincible = 0;
  G.particles = [];
  player.x = 80; player.y = 200;
  player.vx = 0; player.vy = 0;
  player.onGround = false;
  player.attacking = 0;
  player.attackTimer = 0;

  const levels = [
    // Level 1 — tutorial
    {
      map: [
        '                                          ',
        '                                          ',
        '                                          ',
        '                                          ',
        '                                          ',
        '                              GGG         ',
        '                                          ',
        '                                          ',
        '      E                                    ',
        '                                          ',
        '                                  G       ',
        '                                          ',
        '                                          ',
        ' G             G         G                ',
        '                                          ',
        '==========================  ===============',
        '                               D          ',
      ],
    },
    // Level 2
    {
      map: [
        '                                          ',
        '                                          ',
        '                                          ',
        '                              GGG         ',
        '                                          ',
        '         E                                 ',
        '=========================                 ',
        '                              E           ',
        '         G                  G             ',
        '                                          ',
        '                                          ',
        '=========        ===============          ',
        '       G                       G          ',
        '                                          ',
        '                                          ',
        '=====                   ==============    ',
        '                              D           ',
      ],
    },
    // Level 3 — boss
    {
      map: [
        '                                          ',
        '                                          ',
        '                                          ',
        '                                          ',
        '                    GGG                   ',
        '                                          ',
        '            E                   E         ',
        '=============      ==================     ',
        '        G                  G              ',
        '                                          ',
        '         E                    E           ',
        '==========================================',
        '   G      G       G      G       G       ',
        '                                          ',
        '                                          ',
        '=====================     ================',
        '                               D          ',
      ],
    },
  ];

  const lvlData = levels[lvl-1] || levels[0];
  const rows = lvlData.map.length;
  const cols = lvlData.map[0].length;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const ch = lvlData.map[r][c];
      const x = c * TILE;
      const y = r * TILE;
      if (ch === '=') {
        platforms.push({ x, y, w: TILE, h: TILE });
      } else if (ch === 'E') {
        enemies.push({
          x, y, w:28, h:30,
          vx: (Math.random()>0.5?1:-1)*0.8,
          startX: x, range: 80,
          hp: lvl===3 ? 3 : 1,
          maxHp: lvl===3 ? 3 : 1,
          type: lvl===3 ? 'boss' : 'normal',
          animFrame:0, animTimer:0,
        });
      } else if (ch === 'G') {
        gems.push({ x, y, w:16, h:16, collected: false });
      } else if (ch === 'S') {
        spikes.push({ x, y, w:TILE, h:TILE/2 });
      } else if (ch === 'D') {
        door = { x, y, w:TILE, h:TILE*2 };
      }
    }
  }
}

// --- PHYSICS ---
function rectCollide(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function updatePlayer() {
  const p = player;
  const speed = 3.5;
  const grav = 0.45;
  const jump = -8;

  // Horizontal
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) { p.vx = -speed; p.facing = -1; }
  else if (keys['ArrowRight'] || keys['d'] || keys['D']) { p.vx = speed; p.facing = 1; }
  else p.vx *= 0.7;

  // Jump
  if ((keys[' '] || keys['w'] || keys['W'] || keys['ArrowUp']) && p.onGround) {
    p.vy = jump;
    p.onGround = false;
    spawnParticles(p.x + p.w/2, p.y + p.h, '#888', 5, 2);
  }

  p.vy += grav;

  // Attack
  if (attackKey && p.attackTimer <= 0) {
    p.attacking = 12;
    p.attackTimer = 20;
    spawnParticles(p.x + (p.facing>0?p.w:0), p.y + p.h/2, '#ffd700', 3, 4);
    // Hit enemies
    for (let e of enemies) {
      const ax = p.facing > 0 ? p.x + p.w : p.x - 30;
      if (rectCollide({x:ax, y:p.y-10, w:50, h:p.h+20}, {x:e.x, y:e.y, w:e.w, h:e.h})) {
        hitEnemy(e);
      }
    }
  }
  attackKey = false;
  if (p.attackTimer > 0) p.attackTimer--;
  if (p.attacking > 0) p.attacking--;

  // Animation
  p.animTimer++;
  if (p.animTimer > 8) { p.animTimer = 0; p.animFrame = (p.animFrame + 1) % 4; }

  // Move X
  p.x += p.vx;
  for (let pl of platforms) {
    if (rectCollide(p, pl)) {
      if (p.vx > 0) p.x = pl.x - p.w;
      else if (p.vx < 0) p.x = pl.x + pl.w;
      p.vx = 0;
    }
  }

  // Move Y
  p.y += p.vy;
  p.onGround = false;
  for (let pl of platforms) {
    if (rectCollide(p, pl)) {
      if (p.vy > 0) {
        p.y = pl.y - p.h;
        p.vy = 0;
        p.onGround = true;
      } else if (p.vy < 0) {
        p.y = pl.y + pl.h;
        p.vy = 0;
      }
    }
  }

  // Boundaries
  if (p.x < 0) p.x = 0;
  if (p.x + p.w > W) p.x = W - p.w;
  if (p.y + p.h > H) { p.y = H - p.h; p.vy = 0; p.onGround = true; }
  if (p.y < -200) p.y = -200;

  // Invincibility
  if (G.invincible > 0) G.invincible--;
}

function updateEnemies() {
  for (let e of enemies) {
    e.x += e.vx;
    if (e.x < e.startX - e.range || e.x > e.startX + e.range) e.vx *= -1;

    // Simple gravity for enemies
    e.vy = (e.vy || 0) + 0.3;
    e.y += e.vy;
    for (let pl of platforms) {
      if (rectCollide(e, pl)) {
        if (e.vy > 0) { e.y = pl.y - e.h; e.vy = 0; }
      }
    }

    // Animation
    e.animTimer = (e.animTimer || 0) + 1;
    if (e.animTimer > 10) { e.animTimer = 0; e.animFrame = (e.animFrame || 0) + 1; }
  }
}

function checkCollisions() {
  // Enemy damage
  if (G.invincible <= 0) {
    for (let e of enemies) {
      if (e.hp <= 0) continue;
      if (rectCollide(player, e)) {
        takeDamage(1);
        spawnParticles(player.x+player.w/2, player.y+player.h/2, '#ff4757', 15, 5);
        player.vy = -5;
        break;
      }
    }
  }

  // Gems
  for (let g of gems) {
    if (g.collected) continue;
    if (rectCollide(player, {x:g.x-4, y:g.y-4, w:g.w+8, h:g.h+8})) {
      g.collected = true;
      G.gems++;
      spawnParticles(g.x+8, g.y+8, '#ffd700', 10, 4);
      if (G.gems >= G.gemsToWin) {
        showMsg('💎 Все кристаллы собраны!\nИди к вратам!');
      }
    }
  }

  // Door (win)
  if (door && G.gems >= G.gemsToWin) {
    if (rectCollide(player, door)) {
      if (G.level < G.maxLevel) {
        G.level++;
        buildLevel(G.level);
        levelSpan.textContent = 'Уровень ' + G.level;
        showMsg('Уровень ' + G.level + '\nСобери 5 кристаллов!');
      } else {
        G.won = true;
        showMsg(WIN_TEXT);
      }
    }
  }
}

function takeDamage(amount) {
  if (G.invincible > 0) return;
  G.hp -= amount;
  G.invincible = 60; // 1 sec
  G.screenshake = 10;
  if (G.hp <= 0) {
    G.hp = 0;
    G.running = false;
    G.deathCount++;
    showMsg(DEATH_TEXT);
  }
}

function hitEnemy(e) {
  e.hp--;
  spawnParticles(e.x+e.w/2, e.y+e.h/2, '#ff6b81', 8, 5);
  if (e.hp <= 0) {
    spawnParticles(e.x+e.w/2, e.y+e.h/2, '#ff4757', 20, 7);
  }
}

// --- PARTICLES ---
function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = (Math.random() * speed * 2) + 1;
    G.particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 1,
      life: 30 + Math.random() * 30,
      maxLife: 60,
      color,
      size: 2 + Math.random() * 4,
    });
  }
}

function updateParticles() {
  for (let i = G.particles.length-1; i >= 0; i--) {
    const p = G.particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life--;
    if (p.life <= 0) G.particles.splice(i, 1);
  }
}

// --- MESSAGE ---
let msgTimer = 0;
function showMsg(text) {
  msgEl.textContent = text;
  msgEl.classList.add('show');
  msgTimer = 200;
}

// --- RESET ---
function resetGame() {
  G.hp = G.maxHp;
  G.running = true;
  G.won = false;
  G.deathCount = 0;
  G.invincible = 0;
  G.gems = 0;
  G.particles = [];
  msgEl.classList.remove('show');
  buildLevel(G.level);
}

// --- RENDER ---
function drawPlayer() {
  const p = player;
  const flash = G.invincible > 0 && Math.floor(G.invincible / 4) % 2;
  if (flash) return;

  ctx.save();
  ctx.translate(p.x + p.w/2, p.y + p.h/2);
  if (p.facing < 0) ctx.scale(-1, 1);
  ctx.translate(-p.w/2, -p.h/2);

  const bobY = p.onGround ? Math.sin(p.animFrame * Math.PI/2) * 1.5 : 0;

  // Body
  ctx.fillStyle = '#4a6cf7';
  ctx.shadowColor = '#4a6cf7';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.roundRect(2, 6 + bobY, p.w-4, p.h-8, 4);
  ctx.fill();

  // Head
  ctx.fillStyle = '#6b8cff';
  ctx.beginPath();
  ctx.arc(p.w/2, 6 + bobY, 10, 0, Math.PI*2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(p.w/2 - 4, 6 + bobY, 2, 0, Math.PI*2);
  ctx.arc(p.w/2 + 4, 6 + bobY, 2, 0, Math.PI*2);
  ctx.fill();

  // Sword
  if (p.attacking > 0) {
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.moveTo(p.w/2, 10 + bobY);
    const angle = -Math.PI/3 + (1 - p.attacking/12) * Math.PI*1.2;
    ctx.lineTo(p.w/2 + Math.cos(angle)*35, 10 + bobY + Math.sin(angle)*35);
    ctx.stroke();
  }

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawEnemies() {
  for (let e of enemies) {
    if (e.hp <= 0) continue;
    ctx.save();
    ctx.translate(e.x + e.w/2, e.y + e.h/2);

    const bobY = Math.sin(Date.now()/200) * 1;

    // Glow
    ctx.shadowColor = e.type === 'boss' ? '#ff4757' : '#8b0000';
    ctx.shadowBlur = e.type === 'boss' ? 20 : 10;

    // Body
    ctx.fillStyle = e.type === 'boss' ? '#8b0000' : '#4a0e0e';
    ctx.beginPath();
    ctx.roundRect(-e.w/2, -e.h/2 + bobY, e.w, e.h, 4);
    ctx.fill();

    // Eyes (red)
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ff0000';
    ctx.beginPath();
    ctx.arc(-5, -4 + bobY, 3, 0, Math.PI*2);
    ctx.arc(5, -4 + bobY, 3, 0, Math.PI*2);
    ctx.fill();

    // Pupils
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-5 + (e.vx>0?1:-1)*1.5, -4 + bobY, 1, 0, Math.PI*2);
    ctx.arc(5 + (e.vx>0?1:-1)*1.5, -4 + bobY, 1, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
  }
}

function drawGems() {
  for (let g of gems) {
    if (g.collected) continue;
    const bob = Math.sin(Date.now()/300) * 3;
    ctx.save();
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 12;
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.moveTo(g.x + g.w/2, g.y + bob);
    ctx.lineTo(g.x + g.w, g.y + g.h/2 + bob);
    ctx.lineTo(g.x + g.w/2, g.y + g.h + bob);
    ctx.lineTo(g.x, g.y + g.h/2 + bob);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

function drawDoor() {
  if (!door) return;
  const pulsate = Math.sin(Date.now()/400) * 0.15 + 0.85;
  ctx.save();
  ctx.shadowColor = G.gems >= G.gemsToWin ? '#ffd700' : '#555';
  ctx.shadowBlur = G.gems >= G.gemsToWin ? 25 : 5;
  ctx.fillStyle = G.gems >= G.gemsToWin
    ? `rgba(255,215,0,${pulsate*0.5+0.2})`
    : '#333';
  ctx.fillRect(door.x, door.y, door.w, door.h);
  ctx.strokeStyle = G.gems >= G.gemsToWin ? '#ffd700' : '#555';
  ctx.lineWidth = 2;
  ctx.strokeRect(door.x, door.y, door.w, door.h);
  ctx.restore();
}

function drawPlatforms() {
  for (let pl of platforms) {
    ctx.fillStyle = '#2d2d5e';
    ctx.shadowColor = '#1a1a3e';
    ctx.shadowBlur = 4;
    ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
    // Top accent
    ctx.fillStyle = '#3d3d7e';
    ctx.fillRect(pl.x, pl.y, pl.w, 3);
    ctx.shadowBlur = 0;
  }
}

function drawParticles() {
  for (let p of G.particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 5;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function drawBackground() {
  // Gradient sky
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0a2e');
  grad.addColorStop(0.5, '#1a1a3e');
  grad.addColorStop(1, '#2a1a2e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 50; i++) {
    const sx = (i * 137.5 + 50) % W;
    const sy = (i * 97.3 + 20) % (H * 0.6);
    const size = Math.sin(Date.now()/1000 + i) * 0.5 + 1;
    ctx.globalAlpha = 0.3 + Math.sin(Date.now()/1000 + i) * 0.2;
    ctx.beginPath();
    ctx.arc(sx, sy, size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- GAME LOOP ---
function update() {
  if (!G.running || G.won) {
    if (keys['r'] || keys['R']) resetGame();
    return;
  }

  updatePlayer();
  updateEnemies();
  checkCollisions();
  updateParticles();

  if (G.screenshake > 0) G.screenshake--;

  if (msgTimer > 0) {
    msgTimer--;
    if (msgTimer <= 0) msgEl.classList.remove('show');
  }

  // Story display
  if (G.showStory < STORY.length) {
    const s = STORY[G.showStory];
    if (!s.shown && G.level === G.showStory + 1) {
      s.shown = true;
      showMsg(s.text);
      setTimeout(() => { if (msgTimer > 0) msgTimer = Math.min(msgTimer, 80); }, 100);
    }
  }

  // Update UI
  hpSpan.textContent = G.hp;
  gemSpan.textContent = G.gems;
  levelSpan.textContent = 'Уровень ' + G.level;
}

function draw() {
  ctx.save();

  if (G.screenshake > 0) {
    const shake = G.screenshake * 0.5;
    ctx.translate(
      (Math.random()-0.5)*shake,
      (Math.random()-0.5)*shake
    );
  }

  drawBackground();
  drawPlatforms();
  drawDoor();
  drawGems();
  drawEnemies();
  drawPlayer();
  drawParticles();

  ctx.restore();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Polyfill roundRect
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    this.moveTo(x + r[0], y);
    this.lineTo(x + w - r[1], y);
    this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
    this.lineTo(x + w, y + h - r[2]);
    this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
    this.lineTo(x + r[3], y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
    this.lineTo(x, y + r[0]);
    this.quadraticCurveTo(x, y, x + r[0], y);
    this.closePath();
    return this;
  };
}

// --- START ---
buildLevel(1);
showMsg('Dark Ascension\nСобери 5 кристаллов!\n← → Пробел E');
gameLoop();
</script>
</body>
</html>
